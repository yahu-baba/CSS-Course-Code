<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@function at-rule</title>
    <style>
      @function --bd-radius(--radius <length>) {
        result: var(--radius) calc(var(--radius) * 2) calc(var(--radius) * 3);
      }

      #box {
        background: tomato;
        width: 200px;
        height: 200px;
        border-radius: --bd-radius(20px);
      }

      @function --opacity(--color: red, --alpha: 0.5) {
        result: rgb(from var(--color) r g b / var(--alpha));
      }

      #box-2 {
        background: --opacity(green, 0.7);
        width: 200px;
        height: 200px;
        border-radius: 10px;
        margin-top: -30px;
        margin-left: 20px;
      }

      @function --spacing(--mobile, --desktop) {
        result: var(--mobile);

        @media (width > 768px) {
          result: var(--desktop);
        }
      }

      #box-3 {
        background: lightblue;
        width: 200px;
        height: 200px;
        padding: --spacing(1rem, 3rem);
      }

      @function --toRem(--value-px) {
        result: calc(var(--value-px) / 16px * 1rem);
      }

      @function --fluid(--min, --max) {
        result: clamp(var(--min), 4vw + var(--min), var(--max));
      }

      .heading {
        /* font-size: --toRem(50px); */
        font-size: --fluid(24px, 50px);
        margin-bottom: --toRem(40px);
      }
    </style>
  </head>
  <body>
    <h1 class="heading">@function Tutorial</h1>

    <div id="box"></div>
    <!-- <div id="box-2"></div> -->
    <div id="box-3">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Blanditiis rerum
      optio ut magni. Corporis saepe ut quisquam maiores officia! Similique,
      vero? Eligendi nemo placeat earum voluptas ex maiores doloribus at.
    </div>
  </body>
</html>
