      /* Example 6 */
      @property --progress {
        syntax: "<percentage>";
        initial-value: 0%;
        inherits: false;
      }

      .loader {
        width: 200px;
        height: 20px;
        background: lightgrey;
        position: relative;
      }

      .loader::before {
        content: "";
        position: absolute;
        height: 100%;
        width: var(--progress);
        background: green;
        animation: load 3s infinite linear;
      }

      @keyframes load {
        to{
          --progress : 100%
        }
