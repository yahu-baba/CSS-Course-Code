<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertical Scrollsnap</title>
    <style>
      html {
        overflow: hidden;
      }
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow-y: auto;
        scroll-snap-type: y mandatory;
      }

      .panel {
        height: 100vh;
        display: grid;
        place-items: center;
        font-size: 50px;
        scroll-snap-align: start;
        background: #ddd;
        container-type: scroll-state;
      }

      @container scroll-state(snapped: y) {
        .panel div {
          color: yellow;
          background: black;
        }
      }
    </style>
  </head>
  <body>
    <section class="panel"><div>Panel A</div></section>
    <section class="panel"><div>Panel B</div></section>
    <section class="panel"><div>Panel C</div></section>
  </body>
</html>
