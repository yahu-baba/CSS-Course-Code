<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover Menu</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        /* display: grid; */
        /* place-items: center; */
        background: #f4f4f4;
      }

      /* BUTTON */

      button {
        margin: 50px 0 0 50px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #111;
        color: white;
        cursor: pointer;
        font-size: 16px;
      }

      /* POPOVER */

      .menu {
        border: none;
        border-radius: 16px;
        padding: 20px;
        width: 220px;

        transform-origin: top center;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        position-area: bottom span-right;

        opacity: 0;
        transform: rotateX(-90deg);

        transition: all 0.5s allow-discrete;
        /* transition:
          opacity 0.5s,
          transform 0.5s,
          display 0.5s,
          overlay 0.5s; */
        /* transition-behavior: allow-discrete; */
      }

      .menu ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .menu li + li {
        margin-top: 10px;
      }

      .menu a {
        display: block;
        padding: 12px;
        border-radius: 10px;
        text-decoration: none;
        color: #111;
        transition: background 0.3s;
      }

      .menu a:hover {
        background: #f1f1f1;
      }

      .menu:popover-open {
        opacity: 1;
        transform: rotateX(0deg);
      }

      @starting-style {
        .menu:popover-open {
          opacity: 0;
          transform: rotateX(-90deg);
        }
      }
    </style>
  </head>
  <body>
    <button popovertarget="mypop">Open Menu</button>

    <div popover="auto" id="mypop" class="menu">
      <ul>
        <li><a href="#">Profile</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Logout</a></li>
      </ul>
    </div>
  </body>
</html>
